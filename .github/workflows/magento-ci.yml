name: Magento 2 CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:

jobs:
  magento-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Verify PHP Version
        run: php -v
